name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate JSON articles
        continue-on-error: true
        run: python hooks/validate_json.py knowledge/articles/**/*.json

      - name: Check article quality
        continue-on-error: true
        run: python hooks/check_quality.py knowledge/articles/**/*.json

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No new data — skipping commit."
            exit 0
          fi

          DATE=$(date -u +"%Y-%m-%d")
          ARTICLE_COUNT=$(git status --porcelain | grep -cE 'knowledge/articles/.*\.json$' || true)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: daily collect ${DATE} — ${ARTICLE_COUNT} articles"
          git push
