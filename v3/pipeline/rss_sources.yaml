# RSS 数据源配置
# 用于知识库采集流水线的数据输入

sources:
  # ==================== 综合技术 ====================
  - name: Hacker News AI/ML
    url: https://hnrss.org/frontpage?q=ai+OR+llm+OR+agent+OR+machine+learning
    category: 综合技术
    enabled: false

  - name: Lobsters AI/ML
    url: https://lobste.rs/t/ai.rss
    category: 综合技术
    enabled: true

  # ==================== AI 研究 ====================
  - name: arXiv cs.AI
    url: http://export.arxiv.org/rss/cs.AI
